name: '✨ Feature request'
description: Suggest an idea or enhancement
labels: ['enhancement']
body:
  - type: textarea
    attributes:
      label: Summary
      description: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance criteria
      description: List what must be true to consider this done.
      placeholder: '- [ ] ...'
  - type: textarea
    attributes:
      label: Alternatives
      description: Any alternative solutions or prior art?
  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, references, or links.
