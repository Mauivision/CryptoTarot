<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="450" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff00ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00ffff" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Border -->
  <rect x="10" y="10" width="280" height="430" rx="20" fill="none" stroke="url(#glow)" stroke-width="3" filter="url(#neon)"/>
  <!-- Inner Frame -->
  <rect x="25" y="25" width="250" height="400" rx="15" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Circuit Lines -->
  <path d="M40,60 L40,100 L260,100 L260,60" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.7"/>
  <path d="M40,350 L40,390 L260,390 L260,350" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.7"/>
  <!-- Central Node -->
  <circle cx="150" cy="225" r="60" fill="none" stroke="url(#glow)" stroke-width="4" filter="url(#neon)"/>
  <circle cx="150" cy="225" r="40" fill="none" stroke="#ff00ff" stroke-width="2"/>
  <circle cx="150" cy="225" r="20" fill="#000" stroke="#00ffff" stroke-width="1.5"/>
  <!-- Inner Eye -->
  <circle cx="150" cy="225" r="12" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="150" cy="225" r="6" fill="#fff"/>
  <!-- Corner Nodes -->
  <circle cx="40" cy="40" r="8" fill="#ff00ff" filter="url(#neon)"/>
  <circle cx="260" cy="40" r="8" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="40" cy="410" r="8" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="260" cy="410" r="8" fill="#ff00ff" filter="url(#neon)"/>
  <!-- Data Flow -->
  <path d="M40,40 Q75,100 150,225 Q225,350 260,410" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6"/>
  <path d="M260,40 Q225,100 150,225 Q75,350 40,410" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6"/>
  <!-- Blockchain Hash -->
  <text x="150" y="280" font-family="monospace" font-size="10" fill="#00ffff" text-anchor="middle" opacity="0.7">
    0x4f...7261
  </text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<!-- Hybrid Back: Classic frame + Cryptical Ultimate aura -->
<svg width="700" height="1000" viewBox="0 0 700 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>

    <!-- Magical Gradient (Pulsing Aura) -->
    <radialGradient id="aura" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#ffd700;#00ffff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ffff;#ffd700;#ff00ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffd700">
        <animate attributeName="stop-color" values="#ffd700;#ff00ff;#00ffff;#ffd700" dur="6s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>

    <!-- Cosmic Noise -->
    <filter id="cosmic">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="6" seed="42" result="noise">
        <animate attributeName="baseFrequency" values="0.015;0.02;0.015" dur="10s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12"/>
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <!-- Ethereal Glow -->
    <filter id="ethereal">
      <feGaussianBlur stdDeviation="5" result="blur">
        <animate attributeName="stdDeviation" values="4;7;4" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feFlood flood-color="#ffd700" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Whispering Runes -->
    <g id="runes" opacity="0.04" fill="#ffd700">
      <text x="160" y="210" font-family="Georgia, serif" font-size="14" font-style="italic">Genesis</text>
      <text x="540" y="750" font-family="Georgia, serif" font-size="14" font-style="italic">Oracle</text>
      <text x="350" y="510" font-family="monospace" font-size="11" text-anchor="middle">0x4f...</text>
    </g>
  </defs>

  <!-- Base background -->
  <rect x="20" y="20" width="660" height="960" rx="28" fill="url(#bgGrad)" stroke="url(#aura)" stroke-width="4" filter="url(#ethereal)"/>
  <ellipse cx="350" cy="400" rx="260" ry="210" fill="url(#innerGlow)"/>
  <rect x="50" y="50" width="600" height="900" rx="24" fill="none" stroke="#d4af37" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="70" y="70" width="560" height="860" rx="20" fill="none" stroke="#9b59b6" stroke-opacity="0.35" stroke-width="1.8"/>

  <!-- Corner motifs -->
  <g stroke="#d4af37" stroke-opacity="0.45" stroke-width="1.5">
    <path d="M90 155 Q160 85 230 155" fill="none"/>
    <path d="M470 155 Q540 85 610 155" fill="none"/>
    <path d="M90 845 Q160 915 230 845" fill="none"/>
    <path d="M470 845 Q540 915 610 845" fill="none"/>
  </g>

  <!-- Central Oracle Nexus -->
  <g transform="translate(350,520)">
    <!-- Outer Aura Ring -->
    <circle r="150" fill="none" stroke="url(#aura)" stroke-width="9" filter="url(#ethereal)">
      <animate attributeName="r" values="145;158;145" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid Whisper Ring (Rotating) -->
    <circle r="112" fill="none" stroke="#d4af37" stroke-width="4" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner Diamond Core -->
    <path d="M0,-75 L55,0 L0,75 L-55,0 Z" fill="none" stroke="url(#aura)" stroke-width="5" filter="url(#ethereal)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </path>

    <!-- Eternal Spark -->
    <circle r="14" fill="#ffd700" filter="url(#ethereal)">
      <animate attributeName="r" values="11;16;11" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#ffd700;#00ffff;#ff00ff;#ffd700" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Classic sigil overlay -->
  <g opacity="0.55" stroke="#d4af37">
    <circle cx="350" cy="520" r="180" fill="none" stroke-width="3"/>
    <circle cx="350" cy="520" r="120" fill="none" stroke="#9b59b6" stroke-width="3"/>
    <path d="M350 400 L430 520 L350 640 L270 520 Z" fill="none" stroke-width="3"/>
    <g fill="#d4af37" fill-opacity="0.8">
      <circle cx="350" cy="365" r="6"/>
      <circle cx="500" cy="520" r="6"/>
      <circle cx="350" cy="675" r="6"/>
      <circle cx="200" cy="520" r="6"/>
    </g>
  </g>

  <!-- Title (Ethereal) -->
  <text x="350" y="185" font-family="Georgia, serif" font-size="36" fill="#d4af37"
        text-anchor="middle" font-weight="bold" filter="url(#ethereal)">
    Crypto Tarot
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Whispered Truth (Bottom) -->
  <text x="350" y="865" font-family="Georgia, serif" font-size="16" fill="#b8860b"
        text-anchor="middle" opacity="0.65" filter="url(#cosmic)">
    <tspan>DYOR • HODL • The Chain Remembers • Never Share Your Seed</tspan>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Hidden Runes (UV/Blacklight) -->
  <use href="#runes"/>

  <!-- Hover accent (optional) -->
  <style><![CDATA[
    svg:hover rect:nth-of-type(1) {
      filter: url(#ethereal);
    }
  ]]></style>
</svg>
