<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="1000" viewBox="0 0 700 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5a0"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  

    <filter id="embossText" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0.8" dy="0.8" in="SourceAlpha" result="off"/>
      <feGaussianBlur in="off" stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
</defs>
  <rect x="20" y="20" width="660" height="960" rx="24" fill="#0b0f15" stroke="#8b5cf6" stroke-width="3"/>
  <rect x="40" y="60" width="620" height="120" rx="14" fill="#0f1520" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="350" y="130" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="28" fill="#e6f1ff">The Tower Hack</text>

  <g filter="url(#glow)">
    <path d="M120,780 C240,620 460,560 580,580" stroke="url(#grad)" stroke-width="10" fill="none"/>
  </g>

  <g>
    <circle cx="350" cy="500" r="140" fill="#0f1520" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="350,400 370,470 445,470 385,515 405,585 350,545 295,585 315,515 255,470 330,470" fill="url(#grad)"/>
  </g>

  
  <rect x="40" y="760" width="620" height="220" rx="14" fill="rgba(15,21,32,0.95)" stroke="#d4af37" stroke-width="2" opacity="0.95"/>
  
  <!-- Suit/Type label - Light gold -->
  <text x="350" y="790" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="18" font-weight="700" fill="#d4af37" filter="url(#embossText)">Major Arcana</text>
  
  <!-- Upright meaning header - Light white -->
  <text x="350" y="815" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="14" font-weight="600" fill="#f5e6ff" filter="url(#embossText)">Upright:</text>
  <text x="350"  text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="18" fill="#e6f1ff" filter="url(#embossText)" font-weight="700">Sudden disruptions, exploits, rebuilding stronger.</text>
  
  
  <!-- Reversed meaning header - Light purple -->
  <text x="350"  text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="18" font-weight="600" fill="#c9a8e8" filter="url(#embossText)">Reversed:</text>
  <text x="350"  text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="18" fill="#d4af37" filter="url(#embossText)" font-weight="700">Catastrophic falls, unpatched vulnerabilities.</text>
  
  <!-- Brand footer - Muted -->
  <text x="350" y="965" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="11" fill="#5f7494" opacity="0.6">Crypto Tarot</text>

