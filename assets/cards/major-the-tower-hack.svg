  <text x="350" y="874" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="15" font-weight="600" fill="#f8f2ff" filter="url(#embossText)">Catastrophic falls, unpatched vulnerabilities.</text>
  
