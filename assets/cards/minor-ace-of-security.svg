  <!-- Upright meaning header - Light white -->
  <text x="350" y="794" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="16" font-weight="700" fill="#f5e6ff" filter="url(#embossText)">Upright:</text>
  <text x="350" y="820" text-anchor="middle" font-family="Crimson Text, Georgia, serif" font-size="15" font-weight="600" fill="#e6f1ff" filter="url(#embossText)">Sharp insights.</text>
  
  
  <!-- Reversed meaning header - Light purple -->
