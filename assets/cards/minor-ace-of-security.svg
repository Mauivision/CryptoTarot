<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="1000" viewBox="0 0 700 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3864"/>
      <stop offset="100%" stop-color="#ffb3c7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  

    <filter id="embossText" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0.8" dy="0.8" in="SourceAlpha" result="off"/>
      <feGaussianBlur in="off" stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
</defs>
  <rect x="20" y="20" width="660" height="960" rx="24" fill="#0b0f15" stroke="#ff3864" stroke-width="3"/>
  <rect x="40" y="60" width="620" height="120" rx="14" fill="#0f1520" stroke="#ff3864" stroke-width="1.5"/>
  <text x="350" y="130" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="28" fill="#e6f1ff">Ace of Security</text>

  <g filter="url(#glow)">
    <path d="M120,780 C240,620 460,560 580,580" stroke="url(#grad)" stroke-width="10" fill="none"/>
  </g>

  <g>
    <circle cx="350" cy="500" r="140" fill="#0f1520" stroke="#ff3864" stroke-width="2"/>
    <circle cx="350" cy="500" r="100" fill="url(#grad)" opacity="0.25"/>
       <text x="350" y="515" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="96" fill="#e6f1ff">S</text>
  </g>

  
